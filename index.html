<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="A flappy bird inspired game with collision detection and great styles">
	<meta name="author" content="Rayyan Ahmad">
	<meta name="theme-color" content="#72d132">
	<meta name="color-scheme" content="only light">
	<meta name="referrer" content="strict-origin-when-cross-origin">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Air jumper</title>
	<link rel="preload" href="css/style.css" as="style" fetchpriority="high">
	<link rel="stylesheet" href="css/style.css" media="all">
	<link rel="icon" href="icons/favicon.ico" type="image/x-icon">
</head>
<body>
  <div class="hud">
    <div class="score" id="score">0</div>
    <div class="hint">Press <strong>SPACE</strong> or click/tap to jump. Dodge the pipes and stay airborne.</div>
  </div>
  <canvas id="gameCanvas" width="820" height="620"></canvas>
  <div class="overlay visible" id="startOverlay">
    <div class="panel">
      <h1>Air Jumper</h1>
      <p>Fly through glowing pipes, collect points, and survive as long as you can. Tap or press space to begin.</p>
      <button class="button" type="button" id="startButton">Start</button>
    </div>
  </div>
  <div class="overlay" id="gameOverOverlay">
    <div class="panel">
      <h1>Game Over</h1>
      <p id="finalMessage">You made it through the sky!</p>
      <button class="button" id="retryButton">Try Again</button>
    </div>
  </div>
  <div class="hit-flash" id="hitFlash"></div>
  <script src="js/main.js" defer></script>
</body>
</html>
